services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fitable}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fitable}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitable-network

  # SvelteKit Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      #- '${APP_PORT:-3000}:3000'
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-fitable}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-fitable}

      # Application
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      NODE_ENV: production
      PORT: '${APP_PORT:-3000}:3000'
      HOST: 0.0.0.0

      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${ORIGIN:-http://localhost:3000}

      # Email (SMTP)
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-noreply@fitable.app}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fitable-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  fitable-network:
    driver: bridge
